<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Камера</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      font-family: Arial, sans-serif;
    }
    a-scene {
      width: 100% !important;
      height: 100% !important;
      position: fixed;
      top: 0;
      left: 0;
    }
    #scanText {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #FFD700;
      font-size: 2em;
      font-weight: bold;
      text-shadow: 2px 2px 6px #000;
      z-index: 10;
      text-align: center;
      width: 90%;
    }
  </style>
</head>
<body>
  <div id="scanText">Наведи на зображення</div>

  <a-scene embedded id="arScene" arjs="sourceType: webcam; detectionMode: mono; trackingMethod: best;">
    <!-- Маркер -->
    <a-marker id="marker" type="pattern" url="marker.patt">
      
      <!-- PNG-картинка -->
      <a-image id="arImage" src="image.png" position="0 0 0" rotation="-90 0 0" width="2" height="2"></a-image>

      <!-- Аудіо -->
      <a-sound id="arAudio" src="audio.mp3" autoplay="false" loop="false" position="0 0 0"></a-sound>
    
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.getElementById('marker');
    const scanText = document.getElementById('scanText');
    const arAudio = document.getElementById('arAudio');

    // Коли маркер знайдений → показує PNG + грає аудіо
    marker.addEventListener('markerFound', () => {
      scanText.style.display = 'none';
      arAudio.components.sound.playSound();
    });

    // Коли маркер втрачено → показує текст + ставить паузу
    marker.addEventListener('markerLost', () => {
      scanText.style.display = 'block';
      arAudio.components.sound.stopSound();
    });

    // Фікс висоти для мобільних браузерів
    function fixHeight() {
      document.body.style.height = window.innerHeight + 'px';
    }
    window.addEventListener('resize', fixHeight);
    fixHeight();
  </script>
</body>
</html>
